<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - My Site</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>

  <style>
    .plant-image {
      max-width: 150px;
      display: block;
      margin-bottom: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="header-inner">
      <div class="logo">Admin Panel</div>
    </div>
  </div>

  <div class="main">
    <div class="main-inner">

      <div class="nav">
        <a href="homepage.html" class="nav-item">Home</a>
        <a href="index.html" class="nav-item">Search</a>
        <a href="about.html" class="nav-item">About</a>
        <a href="contact.html" class="nav-item">Contact</a>
        <a href="admin.html" class="nav-item">Logout</a>
      </div>

      <div class="content">
        <div class="section">
          <div class="section-header">
            <h1 class="section-title">Admin Panel</h1>
            <p class="section-subtitle">Manage plant database entries below.</p>
          </div>

          <div class="section-body">

            <!-- VIEW -->
            <div class="content-block">
              <h3>Database Entries</h3>
              <input type="text" id="searchInput" placeholder="Search entries...">
              <div id="results" style="margin-top:1rem;"></div>
            </div>

            <!-- FORM -->
            <div class="content-block">
              <h3>Add New Entry</h3>
              <form id="addEntryForm">
                <input type="text" id="newCommonName" placeholder="Common Name" required>
                <input type="text" id="newScientificName" placeholder="Scientific Name" required>
                <input type="text" id="newGroup" placeholder="Group" required>
                <input type="text" id="newHabitat" placeholder="Habitat" required>
                <input type="text" id="newLifecycle" placeholder="Lifecycle (Jan-Dec)" required>
                <input type="text" id="newFeatures" placeholder="Identification Features">
                <input type="text" id="newSize" placeholder="Height/Size">
                <input type="text" id="newNative" placeholder="Native?">
                <input type="text" id="newNotes" placeholder="Notes">

                <!-- ✅ NEW IMAGE FIELD -->
                <input type="text" id="newImage" placeholder="Image filename (e.g. scots-pine.png)">

                <button type="submit">Add Entry</button>
              </form>
              <p id="formMessage" style="margin-top:0.5rem; color:green;"></p>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">
    <div class="footer-inner">
      <p class="footer-text">© 2026 Your Name</p>
    </div>
  </div>

</div>

<script>
// Globals
let data = [];
let fuse;
const resultsDiv = document.getElementById('results');
const searchInput = document.getElementById('searchInput');

// Load JSON
fetch('data.json')
  .then(res => res.json())
  .then(json => {
    data = json;

    fuse = new Fuse(data, {
      keys: ['commonName', 'scientificName', 'group'],
      threshold: 0.2
    });

    displayResults(data);
  });

// Display
function displayResults(items, highlight = '') {
  resultsDiv.innerHTML = '';
  if (!items.length) {
    resultsDiv.innerHTML = '<p>No results found.</p>';
    return;
  }

  const regex = highlight ? new RegExp(`(${highlight})`, 'gi') : null;

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'content-block';

    // ✅ Image path
    const imagePath = item.image ? `images/${item.image}` : '';

    let commonName = item.commonName || '';
    let scientificName = item.scientificName || '';
    let group = item.group || '';
    let habitat = item.habitat || '';
    let lifecycle = item.lifecycle || '';
    let features = item.identification || '';
    let size = item.heightSize || '';
    let native = item.native || '';
    let notes = item.notes || '';

    

    div.innerHTML = `
      <h4>${commonName}</h4>

      ${imagePath ? `<img src="${imagePath}" class="plant-image" onerror="this.style.display='none'">` : ''}

      <p><strong>Scientific Name:</strong> ${scientificName}</p>
      <p><strong>Group:</strong> ${group}</p>
      <p><strong>Habitat:</strong> ${habitat}</p>
      <p><strong>Lifecycle:</strong> ${lifecycle}</p>
      <p><strong>Identification:</strong> ${features}</p>
      <p><strong>Height/Size:</strong> ${size}</p>
      <p><strong>Native:</strong> ${native}</p>
      <p><strong>Notes:</strong> ${notes}</p>
    `;

    resultsDiv.appendChild(div);
  });
}

// Search
searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim();
  if (!query) return displayResults(data);

  const results = fuse.search(query).map(r => r.item);
  displayResults(results, query);
});

// Add entry
const addForm = document.getElementById('addEntryForm');
const formMessage = document.getElementById('formMessage');

addForm.addEventListener('submit', (e) => {
  e.preventDefault();

  const newEntry = {
    commonName: document.getElementById('newCommonName').value.trim(),
    scientificName: document.getElementById('newScientificName').value.trim(),
    group: document.getElementById('newGroup').value.trim(),
    habitat: document.getElementById('newHabitat').value.trim(),
    lifecycle: document.getElementById('newLifecycle').value.trim(),
    identification: document.getElementById('newFeatures').value.trim(),
    heightSize: document.getElementById('newSize').value.trim(),
    native: document.getElementById('newNative').value.trim(),
    notes: document.getElementById('newNotes').value.trim(),

    // ✅ Image saved to JSON object
    image: document.getElementById('newImage').value.trim()
  };

  data.push(newEntry);
  displayResults(data);

  formMessage.textContent = "Entry added successfully!";
  addForm.reset();
});
</script>

</body>
</html>
