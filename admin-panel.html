<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - My Site</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="logo">Admin Panel</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-inner">

      <!-- NAV -->
      <div class="nav">
        <a href="homepage.html" class="nav-item">Home</a>
        <a href="index.html" class="nav-item">Search</a>
        <a href="about.html" class="nav-item">About</a>
        <a href="contact.html" class="nav-item">Contact</a>
        <a href="admin.html" class="nav-item">Logout</a>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <div class="section">
          <div class="section-header">
            <h1 class="section-title">Admin Panel</h1>
            <p class="section-subtitle">Manage plant database entries below.</p>
          </div>

          <div class="section-body">

            <!-- JSON Data Viewer -->
            <div class="content-block">
              <h3>Database Entries</h3>
              <input type="text" id="searchInput" placeholder="Search entries...">
              <div id="results" style="margin-top:1rem;"></div>
            </div>

            <!-- Add New Entry Form -->
            <div class="content-block">
              <h3>Add New Entry</h3>
              <form id="addEntryForm">
                <input type="text" id="newCommonName" placeholder="Common Name" required>
                <input type="text" id="newScientificName" placeholder="Scientific Name" required>
                <input type="text" id="newGroup" placeholder="Group" required>
                <input type="text" id="newHabitat" placeholder="Habitat" required>
                <input type="text" id="newLifecycle" placeholder="Lifecycle (Jan-Dec)" required>
                <input type="text" id="newFeatures" placeholder="Identification Features">
                <input type="text" id="newSize" placeholder="Height/Size">
                <input type="text" id="newNative" placeholder="Native?">
                <input type="text" id="newNotes" placeholder="Cultural / Edible / Medicinal / Historical Notes">
                <button type="submit">Add Entry</button>
              </form>
              <p id="formMessage" style="margin-top:0.5rem; color:green;"></p>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-inner">
      <p class="footer-text">© 2026 Your Name</p>
    </div>
  </div>

</div>

<script>
// Initialize data and Fuse.js
let data = [];
let fuse;
const resultsDiv = document.getElementById('results');
const searchInput = document.getElementById('searchInput');

// Load JSON
fetch('data.json')
  .then(res => res.json())
  .then(json => {
    data = json;

    // Initialize Fuse.js for fuzzy search with stricter search settings
    fuse = new Fuse(data, {
      keys: ['commonName', 'scientificName'],
      threshold: 0.2,  // Set a strict threshold for fuzzy search
      ignoreLocation: false,  // Consider location of the match
      location: 0,  // Prioritize matches near the start of the string
      distance: 100,  // Allow a distance of 100 characters for the match
    });

    // Display all results initially
    displayResults(data);
  })
  .catch(err => {
    console.error("Error loading data.json:", err);
    resultsDiv.innerHTML = "<p>Failed to load data.json</p>";
  });

// Display results function
function displayResults(items, highlight = '') {
  resultsDiv.innerHTML = '';
  if (!items.length) {
    resultsDiv.innerHTML = '<p>No results found.</p>';
    return;
  }

  const regex = highlight ? new RegExp(`(${highlight})`, 'gi') : null;

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'content-block';

    let commonName = item.commonName || '';
    let scientificName = item.scientificName || '';
    let group = item.group || '';
    let habitat = item.habitat || '';
    let lifecycle = item.lifecycle || '';
    let features = item.identification || '';
    let size = item.size || '';
    let native = item.native || '';
    let notes = item.notes || '';

    // Highlight search matches (if any)
    if (regex) {
      commonName = commonName.replace(regex, '<mark>$1</mark>');
      scientificName = scientificName.replace(regex, '<mark>$1</mark>');
      group = group.replace(regex, '<mark>$1</mark>');
      habitat = habitat.replace(regex, '<mark>$1</mark>');
      lifecycle = lifecycle.replace(regex, '<mark>$1</mark>');
      features = features.replace(regex, '<mark>$1</mark>');
      size = size.replace(regex, '<mark>$1</mark>');
      native = native.replace(regex, '<mark>$1</mark>');
      notes = notes.replace(regex, '<mark>$1</mark>');
    }

    // Insert result data into HTML
    div.innerHTML = `
      <h4>${commonName}</h4>
      <p><strong>Scientific Name:</strong> ${scientificName}</p>
      <p><strong>Group:</strong> ${group}</p>
      <p><strong>Habitat:</strong> ${habitat}</p>
      <p><strong>Lifecycle:</strong> ${lifecycle}</p>
      <p><strong>Identification:</strong> ${features}</p>
      <p><strong>Height/Size:</strong> ${size}</p>
      <p><strong>Native:</strong> ${native}</p>
      <p><strong>Notes:</strong> ${notes}</p>
    `;
    resultsDiv.appendChild(div);
  });
}

// Search input listener
searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim();
  if (!query) {
    displayResults(data);  // If no query, show all data
    return;
  }

  const results = fuse.search(query).map(r => r.item);  // Perform the fuzzy search
  displayResults(results, query);  // Display the filtered results
});

// Add new entry form
const addForm = document.getElementById('addEntryForm');
const formMessage = document.getElementById('formMessage');

addForm.addEventListener('submit', (e) => {
  e.preventDefault();

  // Create new entry object
  const newEntry = {
    commonName: document.getElementById('newCommonName').value.trim(),
    scientificName: document.getElementById('newScientificName').value.trim(),
    group: document.getElementById('newGroup').value.trim(),
    habitat: document.getElementById('newHabitat').value.trim(),
    lifecycle: document.getElementById('newLifecycle').value.trim(),
    identification: document.getElementById('newFeatures').value.trim(),
    size: document.getElementById('newSize').value.trim(),
    native: document.getElementById('newNative').value.trim(),
    notes: document.getElementById('newNotes').value.trim()
  };

  // Add the new entry to the data array
  data.push(newEntry);
  displayResults(data);  // Refresh displayed results
  formMessage.textContent = "Entry added successfully!";  // Success message
  addForm.reset();  // Clear the form
});
</script>

</body>
</html>
