<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Database</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
</head>

<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="logo">PlantDB</div>
      <form class="search-bar" onsubmit="return false;">
        <input type="text" id="searchInput" placeholder="Search plants..." required>
        <button type="submit">Search</button>
      </form>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-inner">

      <!-- NAV -->
    <div class="nav">
        <a href="homepage.html" class="nav-item">Home</a>
        <a href="index.html" class="nav-item">search</a>
        <a href="about.html" class="nav-item">About</a>
        <a href="contact.html" class="nav-item">Contact</a>
    </div>
      <!-- CONTENT -->
      <div class="content" id="results">
        <p>Loading data...</p>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-inner">
      <p class="footer-text">© 2026 Your Name</p>
    </div>
  </div>

</div>

<script>
// Globals
let data = [];
let fuse;
const resultsDiv = document.getElementById('results');
const searchInput = document.getElementById('searchInput');

// Load JSON
fetch('data.json')
  .then(res => res.json())
  .then(json => {
    data = json;

    // Initialize Fuse.js with all fields
    fuse = new Fuse(data, {
      keys: [
        'commonName', 'scientificName', 'group', 'habitat', 
        'lifecycle', 'identification', 'heightSize', 'native', 'notes'
      ],
      threshold: 0.4,
      ignoreLocation: true
    });

    displayResults(data); // show all initially
  })
  .catch(err => {
    console.error("Error loading data.json:", err);
    resultsDiv.innerHTML = "<p>Failed to load data.json</p>";
  });

// Display function
function displayResults(items, highlight='') {
  resultsDiv.innerHTML = '';
  if (!items.length) {
    resultsDiv.innerHTML = '<p>No results found.</p>';
    return;
  }

  const regex = highlight ? new RegExp(`(${highlight})`, 'gi') : null;

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'content-block';

    const fields = {
      'Common Name': item.commonName,
      'Scientific Name': item.scientificName,
      'Group': item.group,
      'Habitat': item.habitat,
      'Lifecycle': item.lifecycle,
      'Identification': item.identification,
      'Height/Size': item.heightSize,
      'Native?': item.native,
      'Notes': item.notes
    };

    let innerHTML = '';
    for (let key in fields) {
      let value = fields[key] || '';
      if (regex) value = value.replace(regex, '<mark>$1</mark>');
      if (value) innerHTML += `<p><strong>${key}:</strong> ${value}</p>`;
    }

    div.innerHTML = `<h3>${item.commonName}</h3>` + innerHTML;
    resultsDiv.appendChild(div);
  });
}

// Search listener
searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim();
  if (!query) {
    displayResults(data);
    return;
  }

  const results = fuse.search(query).map(r => r.item);
  displayResults(results, query);
});
</script>

</body>
</html>
